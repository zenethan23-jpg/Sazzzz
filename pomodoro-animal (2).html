<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Pals 🐾</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fef3e2;--bg2:#fde8c8;--card:#fff8ee;
  --text:#3d2c1e;--text2:#7a5c42;--accent:#ff7043;
  --accent2:#ffb300;--ring:#ff7043;--btn:#ff7043;
  --btntext:#fff;--shadow:rgba(61,44,30,0.12);
  --radius:20px;--anim:0.35s cubic-bezier(.4,0,.2,1);
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:2rem 1rem 4rem;transition:background var(--anim),color var(--anim);overflow-x:hidden;}

body.theme-cat{--bg:#fef3e2;--bg2:#fde8c8;--card:#fff8ee;--text:#3d2c1e;--text2:#7a5c42;--accent:#ff7043;--accent2:#ffb300;--ring:#ff7043;}
body.theme-frog{--bg:#e8f5e9;--bg2:#c8e6c9;--card:#f1f8e9;--text:#1b5e20;--text2:#388e3c;--accent:#43a047;--accent2:#76ff03;--ring:#43a047;}
body.theme-dog{--bg:#e8eaf6;--bg2:#c5cae9;--card:#f3e5f5;--text:#1a237e;--text2:#3949ab;--accent:#7c4dff;--accent2:#448aff;--ring:#7c4dff;}
body.theme-fox{--bg:#fff3e0;--bg2:#ffe0b2;--card:#fff8e1;--text:#bf360c;--text2:#e64a19;--accent:#ff6d00;--accent2:#ff9100;--ring:#ff6d00;}
body.theme-panda{--bg:#fafafa;--bg2:#f5f5f5;--card:#ffffff;--text:#212121;--text2:#424242;--accent:#222;--accent2:#888;--ring:#222;}
body.theme-owl{--bg:#e8eaf6;--bg2:#c5cae9;--card:#ede7f6;--text:#311b92;--text2:#4527a0;--accent:#512da8;--accent2:#e040fb;--ring:#512da8;}
body.theme-bunny{--bg:#fce4ec;--bg2:#f8bbd0;--card:#fff0f5;--text:#880e4f;--text2:#ad1457;--accent:#e91e63;--accent2:#ff4081;--ring:#e91e63;}
body.theme-bear{--bg:#efebe9;--bg2:#d7ccc8;--card:#fafafa;--text:#3e2723;--text2:#5d4037;--accent:#6d4c41;--accent2:#bcaaa4;--ring:#6d4c41;}

h1{font-size:2rem;font-weight:900;color:var(--accent);letter-spacing:-0.5px;margin-bottom:0.2rem;text-align:center;}
.subtitle{font-size:0.95rem;color:var(--text2);margin-bottom:1.5rem;text-align:center;}

.card{background:var(--card);border-radius:var(--radius);box-shadow:0 8px 40px var(--shadow);padding:2rem 2.5rem 2.5rem;width:100%;max-width:460px;position:relative;transition:background var(--anim);margin-bottom:1.2rem;}

.animal-stage{display:flex;justify-content:center;align-items:center;height:170px;margin-bottom:1rem;position:relative;}
.animal-stage svg{width:150px;height:150px;filter:drop-shadow(0 4px 16px var(--shadow));transition:transform 0.15s;}
.animal-stage svg:hover{transform:scale(1.04) rotate(-2deg);}
.tail{transform-origin:50% 90%;animation:wagTail 1.8s ease-in-out infinite;}
@keyframes wagTail{0%,100%{transform:rotate(-12deg);}50%{transform:rotate(12deg);}}
.blink{animation:blink 3.5s ease-in-out infinite;}
@keyframes blink{0%,92%,96%,100%{transform:scaleY(1);}93%,95%{transform:scaleY(0.08);}}
.bounce{animation:bounce 2.2s ease-in-out infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.ear-twitch{animation:earTwitch 2.8s ease-in-out infinite;}
@keyframes earTwitch{0%,80%,100%{transform:rotate(0deg);}82%,86%{transform:rotate(-10deg);}84%{transform:rotate(10deg);}}
.idle-wobble{transform-origin:center bottom;animation:idleWobble 3s ease-in-out infinite;}
@keyframes idleWobble{0%,100%{transform:rotate(0);}30%{transform:rotate(1.5deg);}60%{transform:rotate(-1.5deg);}}

.timer-wrap{display:flex;justify-content:center;align-items:center;margin-bottom:1.5rem;position:relative;}
.ring-svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--bg2);stroke-width:10;}
.ring-progress{fill:none;stroke:var(--ring);stroke-width:10;stroke-linecap:round;stroke-dasharray:534;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear,stroke var(--anim);}
.timer-text{position:absolute;font-family:'Space Mono',monospace;font-size:2.8rem;font-weight:700;color:var(--text);letter-spacing:2px;transition:color var(--anim);}
.mode-label{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);background:var(--bg2);padding:2px 12px;border-radius:99px;white-space:nowrap;}

.controls{display:flex;gap:0.75rem;justify-content:center;margin-bottom:1.2rem;}
.btn{padding:0.65rem 1.5rem;background:var(--btn);color:var(--btntext);border:none;border-radius:99px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;box-shadow:0 4px 12px var(--shadow);transition:transform 0.12s,box-shadow 0.12s,background var(--anim);}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px var(--shadow);}
.btn:active{transform:scale(0.97);}
.btn.secondary{background:var(--bg2);color:var(--text);box-shadow:none;}
.btn.secondary:hover{background:var(--accent2);color:#fff;}
.btn.sm{padding:0.4rem 1rem;font-size:0.85rem;}

.mode-tabs{display:flex;gap:0.5rem;justify-content:center;margin-bottom:1.2rem;}
.tab{padding:0.4rem 1rem;border-radius:99px;background:var(--bg2);color:var(--text2);border:none;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;transition:background var(--anim),color var(--anim);}
.tab.active{background:var(--accent);color:#fff;}

/* TIME SETTINGS PANEL */
.settings-toggle{display:flex;align-items:center;justify-content:center;gap:0.4rem;cursor:pointer;color:var(--text2);font-size:0.82rem;font-weight:700;margin-bottom:0.8rem;background:none;border:none;font-family:'Nunito',sans-serif;transition:color var(--anim);}
.settings-toggle:hover{color:var(--accent);}
.settings-toggle .arrow{transition:transform 0.25s;display:inline-block;}
.settings-toggle.open .arrow{transform:rotate(180deg);}
.settings-panel{display:none;background:var(--bg2);border-radius:14px;padding:1rem 1.2rem;margin-bottom:1rem;transition:background var(--anim);}
.settings-panel.open{display:block;}
.settings-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.7rem;}
.setting-item{display:flex;flex-direction:column;gap:0.3rem;}
.setting-item label{font-size:0.72rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;}
.setting-item input[type=number]{width:100%;padding:0.4rem 0.6rem;border-radius:8px;border:2px solid transparent;background:var(--card);font-family:'Space Mono',monospace;font-size:1rem;font-weight:700;color:var(--text);text-align:center;outline:none;transition:border-color 0.2s;}
.setting-item input[type=number]:focus{border-color:var(--accent);}
.setting-item input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
.settings-apply{width:100%;margin-top:0.7rem;padding:0.5rem;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;transition:opacity 0.2s;}
.settings-apply:hover{opacity:0.88;}

/* MUSIC */
.music-bar{display:flex;align-items:center;gap:0.75rem;background:var(--bg2);border-radius:12px;padding:0.6rem 1rem;margin-bottom:1rem;transition:background var(--anim);}
.music-label{font-size:0.82rem;font-weight:700;color:var(--text2);white-space:nowrap;}
.music-btn{background:none;border:none;cursor:pointer;font-size:1.3rem;padding:0;line-height:1;transition:transform 0.15s;}
.music-btn:hover{transform:scale(1.2);}
.music-select{flex:1;border:none;background:transparent;font-family:'Nunito',sans-serif;font-size:0.85rem;color:var(--text);cursor:pointer;outline:none;}
.vol-slider{width:70px;accent-color:var(--accent);}

/* ANIMAL PICKER */
.animal-picker{display:flex;gap:0.5rem;flex-wrap:wrap;justify-content:center;margin-bottom:0.7rem;}
.animal-chip{padding:0.35rem 0.8rem;border-radius:99px;background:var(--bg2);border:2px solid transparent;font-size:0.82rem;font-weight:700;cursor:pointer;transition:all 0.18s;color:var(--text2);}
.animal-chip:hover{border-color:var(--accent);}
.animal-chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}

/* SESSIONS */
.sessions-row{display:flex;gap:0.5rem;justify-content:center;margin-top:0.3rem;}
.session-dot{width:12px;height:12px;border-radius:50%;background:var(--bg2);border:2px solid var(--accent);transition:background 0.3s;}
.session-dot.done{background:var(--accent);}

/* STATS */
.stats-row{display:flex;gap:1rem;justify-content:center;margin-top:1.2rem;}
.stat{text-align:center;}
.stat-num{font-family:'Space Mono',monospace;font-size:1.3rem;font-weight:700;color:var(--accent);}
.stat-lbl{font-size:0.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;}

/* ===== TO-DO LIST CARD ===== */
.todo-card{background:var(--card);border-radius:var(--radius);box-shadow:0 8px 40px var(--shadow);padding:1.5rem 2rem 2rem;width:100%;max-width:460px;transition:background var(--anim);}
.todo-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.todo-title{font-size:1.1rem;font-weight:900;color:var(--accent);}
.todo-count{font-size:0.78rem;color:var(--text2);font-weight:700;background:var(--bg2);padding:2px 10px;border-radius:99px;}
.todo-input-row{display:flex;gap:0.5rem;margin-bottom:1rem;}
.todo-input{flex:1;padding:0.55rem 1rem;border-radius:99px;border:2px solid var(--bg2);background:var(--bg2);font-family:'Nunito',sans-serif;font-size:0.95rem;color:var(--text);outline:none;transition:border-color 0.2s,background var(--anim);}
.todo-input:focus{border-color:var(--accent);background:var(--card);}
.todo-input::placeholder{color:var(--text2);opacity:0.6;}
.todo-add-btn{padding:0.55rem 1.1rem;background:var(--accent);color:#fff;border:none;border-radius:99px;font-family:'Nunito',sans-serif;font-size:1.1rem;font-weight:900;cursor:pointer;transition:transform 0.12s,opacity 0.15s;}
.todo-add-btn:hover{transform:scale(1.1);}

.todo-filters{display:flex;gap:0.4rem;margin-bottom:0.8rem;}
.filter-btn{padding:0.28rem 0.8rem;border-radius:99px;background:var(--bg2);border:none;font-family:'Nunito',sans-serif;font-size:0.78rem;font-weight:700;cursor:pointer;color:var(--text2);transition:background var(--anim),color var(--anim);}
.filter-btn.active{background:var(--accent);color:#fff;}

.todo-list{display:flex;flex-direction:column;gap:0.5rem;max-height:320px;overflow-y:auto;padding-right:2px;}
.todo-list::-webkit-scrollbar{width:4px;}
.todo-list::-webkit-scrollbar-track{background:transparent;}
.todo-list::-webkit-scrollbar-thumb{background:var(--bg2);border-radius:4px;}

.todo-item{display:flex;align-items:center;gap:0.6rem;padding:0.65rem 0.9rem;background:var(--bg2);border-radius:12px;transition:background var(--anim),opacity 0.2s;animation:slideIn 0.25s cubic-bezier(.4,0,.2,1);}
@keyframes slideIn{from{transform:translateY(-8px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.todo-item.done-item{opacity:0.55;}
.todo-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--accent);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background 0.2s,border-color 0.2s;font-size:0.75rem;}
.todo-check.checked{background:var(--accent);border-color:var(--accent);color:#fff;}
.todo-text{flex:1;font-size:0.92rem;font-weight:600;color:var(--text);word-break:break-word;transition:color var(--anim);}
.todo-text.struck{text-decoration:line-through;color:var(--text2);}
.todo-session-tag{font-size:0.7rem;background:var(--accent);color:#fff;padding:1px 7px;border-radius:99px;flex-shrink:0;opacity:0.85;}
.todo-delete{background:none;border:none;cursor:pointer;color:var(--text2);font-size:1rem;padding:0 2px;line-height:1;opacity:0;transition:opacity 0.15s,color 0.15s;}
.todo-item:hover .todo-delete{opacity:1;}
.todo-delete:hover{color:#e53935;}

.todo-empty{text-align:center;padding:1.5rem 0;color:var(--text2);font-size:0.9rem;}
.todo-empty span{font-size:2rem;display:block;margin-bottom:0.4rem;}

.todo-footer{display:flex;align-items:center;justify-content:space-between;margin-top:0.8rem;}
.todo-clear-btn{background:none;border:none;font-family:'Nunito',sans-serif;font-size:0.78rem;font-weight:700;color:var(--text2);cursor:pointer;padding:0;transition:color 0.15s;}
.todo-clear-btn:hover{color:#e53935;}
.todo-progress{font-size:0.78rem;color:var(--text2);font-weight:700;}

/* CONFETTI */
#confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;}

/* BADGE */
.badge{position:absolute;top:-14px;right:16px;background:var(--accent2);color:#fff;font-size:0.72rem;font-weight:700;letter-spacing:1px;padding:3px 10px;border-radius:99px;text-transform:uppercase;animation:popIn 0.4s cubic-bezier(.4,0,.2,1) both;}
@keyframes popIn{from{transform:scale(0.5) rotate(-8deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
@keyframes pulseRing{0%{transform:scale(1);opacity:1;}100%{transform:scale(1.7);opacity:0;}}
.pulse{position:absolute;width:200px;height:200px;border-radius:50%;border:4px solid var(--accent);pointer-events:none;animation:pulseRing 0.7s ease-out forwards;}

.bubble{position:absolute;top:8px;right:-10px;background:var(--accent);color:#fff;font-size:0.78rem;font-weight:700;padding:5px 12px;border-radius:12px;white-space:nowrap;pointer-events:none;animation:bubblePop 0.4s cubic-bezier(.4,0,.2,1) both,bubbleFade 0.5s 2.5s forwards;}
.bubble::before{content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);border:6px solid transparent;border-right-color:var(--accent);}
@keyframes bubblePop{from{transform:scale(0.5);opacity:0;}to{transform:scale(1);opacity:1;}}
@keyframes bubbleFade{to{opacity:0;transform:translateY(-6px);}}

.dark-btn{position:fixed;top:1rem;right:1rem;background:var(--card);border:none;border-radius:99px;padding:0.5rem 1rem;font-size:1rem;cursor:pointer;box-shadow:0 2px 8px var(--shadow);transition:background var(--anim);font-family:'Nunito',sans-serif;font-weight:700;color:var(--text);}

body.dark{--bg:#1a1209;--bg2:#2a1f0f;--card:#231911;--text:#f5e6cf;--text2:#c8a87a;--shadow:rgba(0,0,0,0.4);}
body.dark.theme-frog{--bg:#0a1a0a;--bg2:#102010;--card:#0f1f0f;--text:#b9f0bc;--text2:#66bb6a;}
body.dark.theme-dog{--bg:#0a0d1a;--bg2:#10152a;--card:#0f1323;--text:#c5caff;--text2:#7986cb;}
body.dark.theme-fox{--bg:#1a0d00;--bg2:#2a1500;--card:#231200;--text:#ffe0b2;--text2:#ff8a65;}
body.dark.theme-panda{--bg:#111;--bg2:#1e1e1e;--card:#181818;--text:#eee;--text2:#aaa;}
body.dark.theme-owl{--bg:#0d0b1a;--bg2:#1a1530;--card:#120f22;--text:#d1c4e9;--text2:#9575cd;}
body.dark.theme-bunny{--bg:#1a0010;--bg2:#2a0018;--card:#20001a;--text:#fce4ec;--text2:#f48fb1;}
body.dark.theme-bear{--bg:#120a07;--bg2:#1e110c;--card:#160e09;--text:#efebe9;--text2:#a1887f;}

footer{margin-top:1.5rem;text-align:center;font-size:0.78rem;color:var(--text2);}
</style>
</head>
<body class="theme-cat" id="body">
<canvas id="confetti"></canvas>
<button class="dark-btn" onclick="toggleDark()" id="darkBtn">🌙 Dark</button>

<h1 id="appTitle">🐾 Pomodoro Pals</h1>
<p class="subtitle">Stay focused, one paw at a time.</p>

<!-- TIMER CARD -->
<div class="card" id="mainCard">
  <span class="badge" id="badge">Focus!</span>
  <div class="animal-stage" id="animalStage"></div>

  <div class="timer-wrap">
    <svg class="ring-svg" width="200" height="200" viewBox="0 0 200 200">
      <circle class="ring-bg" cx="100" cy="100" r="85"/>
      <circle class="ring-progress" id="ringProgress" cx="100" cy="100" r="85"/>
    </svg>
    <span class="mode-label" id="modeLabel">Work</span>
    <span class="timer-text" id="timerDisplay">25:00</span>
  </div>

  <div class="mode-tabs">
    <button class="tab active" onclick="setMode('work',this)">Work</button>
    <button class="tab" onclick="setMode('short',this)">Short Break</button>
    <button class="tab" onclick="setMode('long',this)">Long Break</button>
  </div>

  <div class="controls">
    <button class="btn" id="startBtn" onclick="toggleTimer()">▶ Start</button>
    <button class="btn secondary" onclick="resetTimer()">↺ Reset</button>
  </div>

  <!-- TIME SETTINGS -->
  <button class="settings-toggle" id="settingsToggle" onclick="toggleSettings()">
    ⏱ Customize times <span class="arrow">▼</span>
  </button>
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-grid">
      <div class="setting-item">
        <label>Work (min)</label>
        <input type="number" id="setWork" value="25" min="1" max="99">
      </div>
      <div class="setting-item">
        <label>Short break</label>
        <input type="number" id="setShort" value="5" min="1" max="60">
      </div>
      <div class="setting-item">
        <label>Long break</label>
        <input type="number" id="setLong" value="15" min="1" max="60">
      </div>
    </div>
    <button class="settings-apply" onclick="applySettings()">Apply & Reset Timer</button>
  </div>

  <!-- MUSIC -->
  <div class="music-bar">
    <span class="music-label">♪ Music</span>
    <button class="music-btn" id="musicToggle" onclick="toggleMusic()">▶️</button>
    <select class="music-select" id="musicSelect" onchange="changeMusic()">
      <option value="lofi">Lo-fi Chill</option>
      <option value="rain">Rainy Café</option>
      <option value="forest">Forest Sounds</option>
      <option value="space">Space Drift</option>
      <option value="jazz">Cozy Jazz</option>
    </select>
    <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.05" value="0.35" oninput="setVolume(this.value)">
  </div>

  <!-- ANIMAL PICKER -->
  <div class="animal-picker">
    <button class="animal-chip active" onclick="setAnimal('cat',this)">🐱 Cat</button>
    <button class="animal-chip" onclick="setAnimal('frog',this)">🐸 Frog</button>
    <button class="animal-chip" onclick="setAnimal('dog',this)">🐶 Dog</button>
    <button class="animal-chip" onclick="setAnimal('fox',this)">🦊 Fox</button>
    <button class="animal-chip" onclick="setAnimal('panda',this)">🐼 Panda</button>
    <button class="animal-chip" onclick="setAnimal('owl',this)">🦉 Owl</button>
    <button class="animal-chip" onclick="setAnimal('bunny',this)">🐰 Bunny</button>
    <button class="animal-chip" onclick="setAnimal('bear',this)">🐻 Bear</button>
  </div>

  <div class="sessions-row" id="sessionDots">
    <div class="session-dot"></div>
    <div class="session-dot"></div>
    <div class="session-dot"></div>
    <div class="session-dot"></div>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-num" id="statSessions">0</div><div class="stat-lbl">Sessions</div></div>
    <div class="stat"><div class="stat-num" id="statMinutes">0</div><div class="stat-lbl">Minutes</div></div>
    <div class="stat"><div class="stat-num" id="statStreak">0</div><div class="stat-lbl">Streak 🔥</div></div>
  </div>
</div>

<!-- TO-DO LIST CARD -->
<div class="todo-card">
  <div class="todo-header">
    <span class="todo-title">📋 Task List</span>
    <span class="todo-count" id="todoCount">0 tasks</span>
  </div>

  <div class="todo-input-row">
    <input class="todo-input" id="todoInput" type="text" placeholder="Add a task… then focus!" maxlength="80" onkeydown="if(event.key==='Enter')addTodo()">
    <button class="todo-add-btn" onclick="addTodo()">+</button>
  </div>

  <div class="todo-filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('active',this)">Active</button>
    <button class="filter-btn" onclick="setFilter('done',this)">Done</button>
  </div>

  <div class="todo-list" id="todoList">
    <div class="todo-empty" id="todoEmpty"><span>🐾</span>No tasks yet — add one above!</div>
  </div>

  <div class="todo-footer">
    <button class="todo-clear-btn" onclick="clearDone()">Clear done</button>
    <span class="todo-progress" id="todoProgress"></span>
  </div>
</div>

<footer>Built with 🧡 · Click your animal for a surprise! · Space = start/pause</footer>

<script>
// ===== STATE =====
const MODES={work:{label:'Work',min:25},short:{label:'Short Break',min:5},long:{label:'Long Break',min:15}};
let mode='work',running=false,interval=null,seconds=25*60,totalSeconds=25*60;
let sessions=0,totalMinutes=0,streak=0,currentAnimal='cat';
let audioCtx=null,gainNode=null,musicNodes=[],musicPlaying=false;
let todos=[],todoFilter='all',nextId=1;

function setAnimal(name,btn){
  currentAnimal=name;
  document.querySelectorAll('.animal-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('animalStage').innerHTML=animals[name];
  document.body.className=document.body.className.replace(/theme-\w+/,'theme-'+name)+(document.body.classList.contains('dark')?' dark':'');
  document.getElementById('appTitle').textContent=appTitles[name];
  showBubble();
}
function showBubble(){
  const stage=document.getElementById('animalStage');
  document.querySelectorAll('.bubble').forEach(b=>b.remove());
  const q=animalQuotes[currentAnimal];
  const msg=q[Math.floor(Math.random()*q.length)];
  const b=document.createElement('div');b.className='bubble';b.textContent=msg;
  stage.appendChild(b);
  setTimeout(()=>b.remove(),3100);
}
document.getElementById('animalStage').addEventListener('click',()=>{showBubble();launchConfetti(20);});

// ===== TIMER =====
function formatTime(s){return Math.floor(s/60).toString().padStart(2,'0')+':'+(s%60).toString().padStart(2,'0');}
function updateDisplay(){
  document.getElementById('timerDisplay').textContent=formatTime(seconds);
  const p=1-(seconds/totalSeconds);
  document.getElementById('ringProgress').style.strokeDashoffset=(2*Math.PI*85)*p;
  document.title=formatTime(seconds)+' · '+appTitles[currentAnimal];
}
function setMode(m,btn){
  mode=m;running=false;clearInterval(interval);
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  seconds=totalSeconds=MODES[m].min*60;
  document.getElementById('modeLabel').textContent=MODES[m].label;
  document.getElementById('startBtn').textContent='▶ Start';
  document.getElementById('badge').textContent=MODES[m].label+(m==='work'?'!':'✨');
  updateDisplay();
}
function toggleTimer(){
  if(running){clearInterval(interval);running=false;document.getElementById('startBtn').textContent='▶ Start';}
  else{running=true;document.getElementById('startBtn').textContent='⏸ Pause';interval=setInterval(tick,1000);}
}
function tick(){if(seconds>0){seconds--;updateDisplay();}else{timerFinished();}}
function timerFinished(){
  clearInterval(interval);running=false;
  document.getElementById('startBtn').textContent='▶ Start';
  if(mode==='work'){
    sessions++;totalMinutes+=MODES.work.min;
    if(sessions%4===0)streak++;
    updateStats();updateDots();launchConfetti(60);playChime();showBubble();addPulse();
  }
  if(mode==='work'){if(sessions%4===0)setMode('long',document.querySelectorAll('.tab')[2]);else setMode('short',document.querySelectorAll('.tab')[1]);}
  else{setMode('work',document.querySelectorAll('.tab')[0]);}
}
function resetTimer(){clearInterval(interval);running=false;seconds=totalSeconds=MODES[mode].min*60;document.getElementById('startBtn').textContent='▶ Start';updateDisplay();}
function updateStats(){document.getElementById('statSessions').textContent=sessions;document.getElementById('statMinutes').textContent=totalMinutes;document.getElementById('statStreak').textContent=streak;}
function updateDots(){document.querySelectorAll('.session-dot').forEach((d,i)=>d.classList.toggle('done',i<(sessions%4)||(sessions%4===0&&sessions>0)));}
function addPulse(){const w=document.querySelector('.timer-wrap');const p=document.createElement('div');p.className='pulse';w.appendChild(p);setTimeout(()=>p.remove(),800);}

// ===== TIME SETTINGS =====
function toggleSettings(){
  const panel=document.getElementById('settingsPanel');
  const btn=document.getElementById('settingsToggle');
  panel.classList.toggle('open');
  btn.classList.toggle('open');
}
function applySettings(){
  const w=parseInt(document.getElementById('setWork').value)||25;
  const s=parseInt(document.getElementById('setShort').value)||5;
  const l=parseInt(document.getElementById('setLong').value)||15;
  MODES.work.min=Math.min(Math.max(w,1),99);
  MODES.short.min=Math.min(Math.max(s,1),60);
  MODES.long.min=Math.min(Math.max(l,1),60);
  document.getElementById('setWork').value=MODES.work.min;
  document.getElementById('setShort').value=MODES.short.min;
  document.getElementById('setLong').value=MODES.long.min;
  // reset current mode
  clearInterval(interval);running=false;
  seconds=totalSeconds=MODES[mode].min*60;
  document.getElementById('startBtn').textContent='▶ Start';
  updateDisplay();
  toggleSettings();
}

// ===== AUDIO =====
function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(!gainNode){gainNode=audioCtx.createGain();gainNode.gain.value=0.35;gainNode.connect(audioCtx.destination);}return audioCtx;}
function stopMusic(){musicNodes.forEach(n=>{try{n.stop();}catch(e){}});musicNodes=[];musicPlaying=false;document.getElementById('musicToggle').textContent='▶️';}
function startMusic(){stopMusic();getAudioCtx();const t=document.getElementById('musicSelect').value;gainNode.gain.value=parseFloat(document.getElementById('volSlider').value);if(t==='lofi')makeLofi();else if(t==='rain')makeRain();else if(t==='forest')makeForest();else if(t==='space')makeSpace();else if(t==='jazz')makeJazz();musicPlaying=true;document.getElementById('musicToggle').textContent='⏸';}
function toggleMusic(){if(musicPlaying)stopMusic();else startMusic();}
function changeMusic(){if(musicPlaying)startMusic();}
function setVolume(v){if(gainNode)gainNode.gain.value=parseFloat(v);}
function note(freq,start,dur,vol=0.12,type='sine'){const ctx=getAudioCtx();const osc=ctx.createOscillator();const g=ctx.createGain();osc.type=type;osc.frequency.value=freq;g.gain.setValueAtTime(0,ctx.currentTime+start);g.gain.linearRampToValueAtTime(vol,ctx.currentTime+start+0.05);g.gain.linearRampToValueAtTime(0,ctx.currentTime+start+dur-0.05);osc.connect(g);g.connect(gainNode);osc.start(ctx.currentTime+start);osc.stop(ctx.currentTime+start+dur);musicNodes.push(osc);}
function makeLofi(){const loop=()=>{if(!musicPlaying)return;[[349,440,523,659],[220,261,330,440],[293,349,440,523],[261,329,392,523]].forEach((c,ci)=>c.forEach(f=>note(f,ci*2,1.9,0.04,'sine')));[87,110,73,65].forEach((f,i)=>note(f,i*2,1.9,0.07,'triangle'));setTimeout(loop,8200);};loop();}
function makeRain(){const r=()=>{if(!musicPlaying)return;for(let i=0;i<8;i++)note(200+Math.random()*4000,Math.random()*0.5,0.05+Math.random()*0.1,0.015,'sawtooth');setTimeout(r,80);};const t=()=>{if(!musicPlaying)return;note(40+Math.random()*30,0,1.5,0.08,'sawtooth');setTimeout(t,8000+Math.random()*12000);};r();t();}
function makeForest(){const ctx=getAudioCtx();const c=()=>{if(!musicPlaying)return;const b=800+Math.random()*600;for(let i=0;i<3;i++)note(b+i*150,i*0.08,0.12,0.04,'sine');setTimeout(c,1200+Math.random()*3000);};const w=()=>{if(!musicPlaying)return;const buf=ctx.createBuffer(1,ctx.sampleRate*0.5,ctx.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*0.08;const s=ctx.createBufferSource();s.buffer=buf;const f=ctx.createBiquadFilter();f.type='bandpass';f.frequency.value=300+Math.random()*200;f.Q.value=0.8;const g=ctx.createGain();g.gain.value=0.3;s.connect(f);f.connect(g);g.connect(gainNode);s.start();s.stop(ctx.currentTime+0.5);musicNodes.push(s);setTimeout(w,400+Math.random()*600);};c();w();}
function makeSpace(){[55,82,110,165].forEach((f,i)=>{const ctx=getAudioCtx();const o=ctx.createOscillator();const g=ctx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,ctx.currentTime);g.gain.linearRampToValueAtTime(0.06,ctx.currentTime+4);o.connect(g);g.connect(gainNode);o.start();musicNodes.push(o);const l=ctx.createOscillator();const lg=ctx.createGain();lg.gain.value=f*0.01;l.frequency.value=0.05+i*0.03;l.connect(lg);lg.connect(o.frequency);l.start();musicNodes.push(l);});}
function makeJazz(){const loop=()=>{if(!musicPlaying)return;[110,123,131,147,165,147,131,123].forEach((f,i)=>note(f,i*0.5,0.45,0.08,'triangle'));[[349,440,554],[329,415,523],[392,493,622],[369,466,587]].forEach((c,ci)=>c.forEach(f=>note(f,ci*1,0.8,0.035,'triangle')));setTimeout(loop,4100);};loop();}
function playChime(){[523,659,784,1047].forEach((f,i)=>note(f,i*0.12,0.4,0.15,'sine'));}

const canvas=document.getElementById('confetti');
const ctx2=canvas.getContext('2d');
let confettiArr=[],animating=false;
function launchConfetti(n){canvas.width=window.innerWidth;canvas.height=window.innerHeight;for(let i=0;i<n;i++)confettiArr.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight*.3,vx:(Math.random()-0.5)*5,vy:Math.random()*4+2,size:Math.random()*10+5,color:`hsl(${Math.random()*360},80%,60%)`,rot:Math.random()*360,rotv:(Math.random()-0.5)*8,life:1});if(!animating)animateConf();}
function animateConf(){if(!confettiArr.length){animating=false;ctx2.clearRect(0,0,canvas.width,canvas.height);return;}animating=true;ctx2.clearRect(0,0,canvas.width,canvas.height);confettiArr=confettiArr.filter(c=>c.life>0.02);confettiArr.forEach(c=>{c.x+=c.vx;c.y+=c.vy;c.vy+=0.1;c.rot+=c.rotv;c.life-=0.015;ctx2.save();ctx2.globalAlpha=c.life;ctx2.fillStyle=c.color;ctx2.translate(c.x,c.y);ctx2.rotate(c.rot*Math.PI/180);ctx2.fillRect(-c.size/2,-c.size/4,c.size,c.size/2);ctx2.restore();});requestAnimationFrame(animateConf);}

// ===== DARK MODE =====
let dark=false;
function toggleDark(){dark=!dark;document.body.classList.toggle('dark',dark);document.getElementById('darkBtn').textContent=dark?'☀️ Light':'🌙 Dark';}

// ===== TO-DO LIST =====
function addTodo(){
  const inp=document.getElementById('todoInput');
  const text=inp.value.trim();
  if(!text)return;
  todos.push({id:nextId++,text,done:false,session:sessions});
  inp.value='';
  renderTodos();
  inp.focus();
}
function toggleTodo(id){
  const t=todos.find(t=>t.id===id);
  if(t){
    t.done=!t.done;
    if(t.done)playChime();
    renderTodos();
  }
}
function deleteTodo(id){
  todos=todos.filter(t=>t.id!==id);
  renderTodos();
}
function clearDone(){todos=todos.filter(t=>!t.done);renderTodos();}
function setFilter(f,btn){
  todoFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTodos();
}
function renderTodos(){
  const list=document.getElementById('todoList');
  const empty=document.getElementById('todoEmpty');
  const filtered=todos.filter(t=>{
    if(todoFilter==='active')return!t.done;
    if(todoFilter==='done')return t.done;
    return true;
  });
  const total=todos.length,done=todos.filter(t=>t.done).length;
  document.getElementById('todoCount').textContent=total+' task'+(total!==1?'s':'');
  document.getElementById('todoProgress').textContent=total?done+'/'+total+' done':'';
  if(!filtered.length){
    list.innerHTML='';
    empty.style.display='block';
    const msgs={all:'<span>🐾</span>No tasks yet — add one above!',active:'<span>🎉</span>All done! Great work!',done:'<span>📝</span>No completed tasks yet.'};
    empty.innerHTML=msgs[todoFilter];
    return;
  }
  empty.style.display='none';
  list.innerHTML=filtered.map(t=>`
    <div class="todo-item${t.done?' done-item':''}" id="todo-${t.id}">
      <div class="todo-check${t.done?' checked':''}" onclick="toggleTodo(${t.id})">${t.done?'✓':''}</div>
      <span class="todo-text${t.done?' struck':''}">${escHtml(t.text)}</span>
      ${t.session>0?`<span class="todo-session-tag">S${t.session}</span>`:''}
      <button class="todo-delete" onclick="deleteTodo(${t.id})" title="Delete">✕</button>
    </div>
  `).join('');
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ===== INIT =====
document.getElementById('animalStage').innerHTML=animals['cat'];
updateDisplay();
renderTodos();
